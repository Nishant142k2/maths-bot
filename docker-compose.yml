version: "3.10"

services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: math-mentor-backend
    ports:
      - "8000:8000"
    environment:
      ENVIRONMENT: development
      DEBUG: true
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_KEY: ${SUPABASE_KEY}
      RAG_TOP_K: 3
      EMBEDDING_DIMENSION: 768
      HITL_CONFIDENCE_THRESHOLD: 0.7
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - math-mentor-network
    restart: unless-stopped


  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: math-mentor-frontend
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - math-mentor-network
    restart: unless-stopped


networks:
  math-mentor-network:
    driver: bridge